# Path prefix for Management UI (served via Kong at /rmq)

management.path_prefix = /rmq

# Security: Disable default guest user for remote connections
# Guest user can only connect from localhost (loopback)
loopback_users.guest = true

# Connection limits - prevent resource exhaustion attacks
channel_max = 128
heartbeat = 60

# Logging for security auditing
log.connection.level = info
