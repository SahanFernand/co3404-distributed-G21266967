# Kong API Gateway - Declarative Configuration (Hardened)
# Student ID: G21266967
#
# Security Features:
# - Rate limiting on all services (prevents abuse/DDoS)
# - CORS restricted to Kong public IP (not wildcard *)
# - RabbitMQ admin IP-restricted via Kong ACL
# - Request size limits to prevent payload attacks
# - Security headers (X-Frame-Options, XSS Protection)

_format_version: "3.0"
_transform: true

services:
  - name: joke-service
    url: http://joke:4000
    routes:
      - name: joke-api
        paths:
          - /joke
          - /types
        strip_path: false
      - name: joke-ui
        paths:
          - /joke-ui
        strip_path: true

  - name: submit-service
    url: http://submit:4200
    routes:
      - name: submit-api
        paths:
          - /submit
          - /docs
        strip_path: false
      - name: submit-ui
        paths:
          - /submit-ui
        strip_path: true

  - name: moderate-service
    url: http://moderate:4100
    routes:
      - name: moderate-api
        paths:
          - /moderate
          - /moderated
          - /reject
          - /auth
        strip_path: false
      - name: moderate-oidc
        paths:
          - /login
          - /logout
          - /callback
        strip_path: false
      - name: moderate-ui
        paths:
          - /moderate-ui
        strip_path: true

  - name: rabbitmq-admin
    url: http://rabbitmq:15672
    routes:
      - name: rmq
        paths:
          - /rmq
        strip_path: false

  # RabbitMQ assets - the management UI HTML references js/main.js, css/main.css
  # which the browser resolves to /js/, /css/ etc. RabbitMQ serves them under /rmq/
  # so we point the service URL to /rmq and let Kong prepend it
  - name: rabbitmq-assets
    url: http://rabbitmq:15672/rmq
    routes:
      - name: rmq-assets
        paths:
          - /js
          - /css
          - /img
          - /favicon.ico
          - /api
        strip_path: false

plugins:
  # Rate limiting per service - prevents abuse and DDoS
  - name: rate-limiting
    service: joke-service
    config:
      minute: 60
      policy: local

  - name: rate-limiting
    service: submit-service
    config:
      minute: 60
      policy: local

  - name: rate-limiting
    service: moderate-service
    config:
      minute: 100
      policy: local

  - name: rate-limiting
    service: rabbitmq-admin
    config:
      minute: 50
      policy: local

  - name: rate-limiting
    service: rabbitmq-assets
    config:
      minute: 100
      policy: local

  # CORS - restricted to Kong gateway (domain + IP fallback)
  - name: cors
    config:
      origins:
        - "https://g21266967.duckdns.org"
        - "http://g21266967.duckdns.org"
        - "http://20.239.48.46"
        - "https://20.239.48.46"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
      credentials: true
      max_age: 3600

  # Request size limiting - prevent large payload attacks
  - name: request-size-limiting
    config:
      allowed_payload_size: 1
      size_unit: megabytes

  # Security response headers
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Frame-Options:DENY"
          - "X-Content-Type-Options:nosniff"
          - "X-XSS-Protection:1; mode=block"
          - "Referrer-Policy:strict-origin-when-cross-origin"
