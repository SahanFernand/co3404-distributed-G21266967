# Student ID: G21266967

_format_version: "3.0"
_transform: true

services:
  - name: joke-service
    url: http://joke:4000
    routes:
      - name: joke-api
        paths:
          - /joke
          - /types
        strip_path: false
      - name: joke-ui
        paths:
          - /joke-ui
        strip_path: true

  - name: submit-service
    url: http://submit:4200
    routes:
      - name: submit-api
        paths:
          - /submit
          - /docs
        strip_path: false
      - name: submit-ui
        paths:
          - /submit-ui
        strip_path: true

  - name: moderate-service
    url: http://moderate:4100
    routes:
      - name: moderate-api
        paths:
          - /moderate
          - /moderated
          - /reject
          - /auth
        strip_path: false
      - name: moderate-oidc
        paths:
          - /login
          - /logout
          - /callback
        strip_path: false
      - name: moderate-ui
        paths:
          - /moderate-ui
        strip_path: true

  - name: rabbitmq-admin
    url: http://rabbitmq:15672
    routes:
      - name: rmq
        paths:
          - /rmq
        strip_path: false

plugins:
  - name: rate-limiting
    service: joke-service
    config:
      minute: 20
      policy: local

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
      credentials: true
